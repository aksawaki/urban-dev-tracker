name: 毎朝自動クロール＆サイト更新

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: config.yaml を生成
        run: |
          cp config.actions.yaml config.yaml
          python3 -c "
          import yaml, os
          with open('config.yaml') as f:
              cfg = yaml.safe_load(f)
          cfg.setdefault('chatwork', {})['token'] = os.environ.get('CHATWORK_TOKEN', '')
          cfg.setdefault('chatwork', {})['room_id'] = os.environ.get('CHATWORK_ROOM_ID', '')
          with open('config.yaml', 'w') as f:
              yaml.dump(cfg, f, allow_unicode=True, default_flow_style=False)
          "
        env:
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
      - run: mkdir -p data/processed data/raw data/snapshots
      - run: python3 main.py crawl
        continue-on-error: true
      - name: ChatWork 配信
        run: python3 main.py notify
        continue-on-error: true
        env:
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
      - run: python3 main.py deploy
      - name: コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/articles.json docs/rich.html
          git diff --cached --quiet || git commit -m "auto: 日次クロール＆サイト更新 $(date '+%Y/%m/%d')"
          git pull --rebase origin main
          git push
